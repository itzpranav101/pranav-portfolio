<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <!-- Prevent window.fetch assignment crashes in sandboxed iframe environments -->
    <script>
      (function() {
        try {
          var _fetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return _fetch;
            },
            set: function(v) {
              _fetch = v;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            var _protoFetch = window.fetch;
            Object.defineProperty(Window.prototype, 'fetch', {
              get: function() {
                return this._customFetch || _protoFetch;
              },
              set: function(v) {
                this._customFetch = v;
              },
              configurable: true,
              enumerable: true
            });
          } catch (err) {
            console.warn("Unable to handle fetch assignments on Window.prototype gracefully:", err);
          }
        }
      })();
    </script>
